.ins{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border-radius:10px;margin-bottom:8px;font-size:13.5px}

.fbitem{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}

const RHO=0.45;
const ZS={90:1.282,95:1.645,99:2.326};
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function fxExposures(basis){
 const h=home(),ex={};
 Object.entries(S.plat.bals).forEach(([c,n])=>{const v=conv(n,c,h);if(c!==h&&Math.abs(v)>=1)ex[c]=(ex[c]||0)+v});
 if(basis==='flows')S.plat.inv.forEach(i=>{if(i.ccy&&i.ccy!==h&&i.st!=='paid')ex[i.ccy]=(ex[i.ccy]||0)+conv(i.amt,i.ccy,h)});
 return ex;
}
function varCalc(ex,p){
 const ks=Object.keys(ex);
 if(!ks.length)return{v:0,comp:{},sigma:0};
 const sd=c=>((VOLA[c]||8)/100)/Math.sqrt(252);
 let s2=0;const mcv={};
 ks.forEach(i=>{mcv[i]=0;ks.forEach(j=>{const r=i===j?1:RHO;const t=ex[j]*sd(i)*sd(j)*r;mcv[i]+=t;s2+=ex[i]*t})});
 const sp=Math.sqrt(Math.max(s2,0));
 if(sp<=0)return{v:0,comp:{},sigma:0};
 let V;
 if(p.meth==='mc'){
  const rng=mulberry32(42),N=4000,losses=[];
  const gauss=()=>{let u=0,w=0;while(!u)u=rng();while(!w)w=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*w)};
  for(let k=0;k<N;k++){const Z=gauss();let pl=0;
   ks.forEach(c=>{const e=gauss();pl+=ex[c]*sd(c)*Math.sqrt(p.hor)*(Math.sqrt(RHO)*Z+Math.sqrt(1-RHO)*e)});
   losses.push(-pl)}
  losses.sort((a,b)=>a-b);V=Math.max(0,losses[Math.floor(N*p.conf/100)]);
 }else V=ZS[p.conf]*sp*Math.sqrt(p.hor);
 const comp={};ks.forEach(i=>comp[i]=(ex[i]*mcv[i])/s2*V);
 return{v:V,comp,sigma:sp};
}

function migrate(saved,def){
 // fill in anything a newer version added, without discarding the user's data
 if(saved===null||saved===undefined)return def;
 if(Array.isArray(def))return Array.isArray(saved)?saved:def;
 if(typeof def==='object'&&def!==null){
  if(typeof saved!=='object'||saved===null||Array.isArray(saved))return def;
  const out={};
  Object.keys(def).forEach(k=>{out[k]=migrate(saved[k],def[k])});
  Object.keys(saved).forEach(k=>{if(!(k in out))out[k]=saved[k]});
  return out;
 }
 return saved===undefined?def:saved;
}

function upRow(path,label,desc){
 const s=ref(path);
 const icon={empty:'&#8682;',uploading:'&#8682;',processing:'&#9203;',verified:'&#10003;',failed:'&#33;'}[s.st];
 let body='',act='';
 if(s.st==='empty'){body=`<div class="b">${esc(label)}</div><div class="small muted">${esc(desc)}</div>`;act=`<button class="btn btn-s btn-sm" onclick="pick('${path}')">Upload</button>`}
 if(s.st==='uploading'){body=`<div class="b">${esc(s.name)}</div><div class="pbar"><div style="width:${s.pct}%"></div></div>`}
 if(s.st==='processing'){body=`<div class="b">${esc(s.name)}</div><div class="small muted">Checking the document…</div>`}
 if(s.st==='verified'){body=`<div class="b">${esc(label)}</div><div class="small" style="color:#027A48">${esc(s.name)} · verified</div>`;act=`<button class="btn btn-g btn-sm" onclick="pick('${path}')">Replace</button>`}
 if(s.st==='failed'){body=`<div class="b">${esc(label)}</div><div class="small" style="color:#B42318">${esc(s.why)}</div>`;act=`<button class="btn btn-p btn-sm" onclick="retry('${path}')">Retry</button>`}
 const cls=s.st==='verified'?'ok':s.st==='failed'?'fail':(s.st==='uploading'||s.st==='processing')?'busy':'';
 return `<div class="up ${cls}"><div class="ic">${icon}</div><div class="bd">${body}</div>${act}</div>`;
}

function computeRisk(){
 const a=app_(),r=a.risk,sig=[];
 let score=8;
 const add=(t,ok,w,note)=>{sig.push({t,ok,note:note||''});score+=ok?0:w};
 if(S.acct==='biz'){
  const b=S.kyb.biz;
  add('Registry match on '+cc().reg,cc().regRx.test(b.reg.trim()),12,'Format checked against '+cc().name+' registry rules');
  const wm=webMatch();
  add('Website matches business description',wm!==false,12,wm===null?'No website given, neutral':'');
  add('Registered address is physical',r.pobox===0,r.pobox*6,r.pobox?'PO Box attempted '+r.pobox+' time(s) during entry':'');
  add('Sanctions and PEP screening',!r.sanctionsHit,50,r.sanctionsHit?'Possible match on one person, needs an analyst':'All people clear');
  add('Documents verified',true,0,'All required documents readable and consistent');
  if(S.kyb.biz.entity==='Holding company'){score+=10;sig.push({t:'Holding structure',ok:false,note:'Layered ownership adds review weight'})}
  if(S.kyb.act.vol==='Over 1M'){score+=8;sig.push({t:'High expected volume',ok:false,note:'Over 1M per month'})}
  if(S.user.country==='AE'){score+=15;sig.push({t:'Market risk tier',ok:false,note:'Outside core markets'})}
 }else{
  add('Identity document and selfie match',true,0,'Face match passed');
  add('Residential address is physical',r.pobox===0,r.pobox*6,'');
  add('Sanctions and PEP screening',!r.sanctionsHit,50,r.sanctionsHit?'Possible match, needs an analyst':'Clear');
  if(S.user.country==='AE'){score+=15;sig.push({t:'Market risk tier',ok:false,note:'Outside core markets'})}
 }
 r.score=score;r.signals=sig;save();
 return score;
}

/* ============ payment run: what a finance team actually does on a Friday ============ */
function runSel(){return S.runSel||(S.runSel={})}
function runScopeBills(){
 const n=new Date();n.setHours(0,0,0,0);
 const sc=S.runScope||'week';
 return (S.plat.bills||[]).filter(b=>{
  const d=Math.round((new Date(b.due)-n)/86400000);
  if(sc==='overdue')return d<0;
  if(sc==='week')return d<=7;
  if(sc==='month')return d<=30;
  return true;
 });
}
function runSelected(){return runScopeBills().filter(b=>runSel()[b.id])}
function runTotals(){
 const t={};
 runSelected().forEach(b=>{const c=b.ccy||home();t[c]=(t[c]||0)+b.amt});
 return t;
}
function runFunding(){
 const t=runTotals();
 return Object.entries(t).map(([c,need])=>{
  const have=balOf(c),short=Math.max(0,need-have);
  let src=null;
  if(short>0){
   // A source can only help with what it does not already owe this run,
   // otherwise fixing one currency quietly breaks another.
   src=openCcys().filter(x=>x!==c)
    .map(x=>({c:x,surplus:Math.max(0,balOf(x)-(t[x]||0))}))
    .filter(x=>conv(x.surplus,x.c,c)*(1-FXM)>=short)
    .sort((a,b)=>conv(b.surplus,b.c,home())-conv(a.surplus,a.c,home()))[0];
  }
  return {ccy:c,need:need,have:have,short:short,src:src?src.c:null,srcSurplus:src?src.surplus:0};
 });
}
function runFundShort(){return runFunding().filter(f=>f.short>0)}
function runFixFunding(f){
 if(!f.src){toast('No balance has enough spare after its own bills to cover the '+f.ccy+' shortfall. Top up or take something out of the run.');return}
 const needSrc=conv(f.short,f.ccy,f.src)/(1-FXM)*1.002;
 const t=runTotals();
 const spare=balOf(f.src)-(t[f.src]||0);
 if(needSrc>spare){toast(f.src+' is already committed to this run. Converting would leave it short.');return}
 S.fx={from:f.src,to:f.ccy,amt:String(Math.ceil(needSrc*100)/100)};doFx();
 toast('Converted to cover the '+f.ccy+' shortfall. The run is funded.');
}
function runChecks(){
 const out=[],sel=runSelected(),h=home();
 const seen={};
 sel.forEach(b=>{const k=(b.who+'|'+b.amt).toLowerCase();if(seen[k])out.push({lvl:'warn',t:'Two identical bills for '+esc(b.who.split(' ·')[0])+' at '+fmt(b.amt,b.ccy||h)+' are both selected. Check this is not the same invoice twice.'});seen[k]=1});
 sel.forEach(b=>{const c=findContact(b.who.split(' ·')[0]);if(c&&!c.acct)out.push({lvl:'warn',t:'No saved account details for '+esc(b.who.split(' ·')[0])+'. Add them before this one can go out.'})});
 const tot=sel.reduce((t,b)=>t+conv(b.amt,b.ccy||h,h),0);
 if(tot>0.6*totalHome())out.push({lvl:'info',t:'This run is '+Math.round(tot/totalHome()*100)+'% of your total balance. Large runs route to a second approver.'});
 const n=new Date();n.setHours(0,0,0,0);
 const late=sel.filter(b=>new Date(b.due)<n).length;
 if(late)out.push({lvl:'info',t:late+' of these are already past due, so paying this run clears them today.'});
 if(!out.length&&sel.length)out.push({lvl:'good',t:'MO checked all '+sel.length+' payments. Saved account details on file, no duplicates, amounts in your normal range.'});
 return out;
}

function executePaymentRun(){
 const sel=runSelected(),h=home();
 if(!sel.length){toast('Select at least one bill');return}
 if(!can('create')){toast(roleName(actingRole())+' cannot create payments');return}
 const short=runFundShort();
 if(short.length){toast('Fund the '+short[0].ccy+' shortfall first, MO has a one click conversion ready');return}
 const missing=sel.filter(b=>{const c=findContact(b.who.split(' ·')[0]);return !c||!c.acct});
 if(missing.length){toast('Add account details for '+missing[0].who.split(' ·')[0]+' before running');return}
 const totHome=sel.reduce((t,b)=>t+conv(b.amt,b.ccy||h,h),0);
 const needsAppr=needsApproval(totHome)||!can('fund');
 const run={id:uid(),t:Date.now(),by:S.user.name||'You',n:sel.length,totHome:totHome,
  items:sel.map(b=>({id:b.id,who:b.who,amt:b.amt,ccy:b.ccy||h,due:b.due,ref:b.ref||null,src:b.src||null,app:b.app||null,st:'queued'})),
  st:needsAppr?'pending':'executed'};
 if(needsAppr){
  S.plat.runs.unshift(run);
  S.plat.approvals.unshift({id:uid(),by:run.by,byRole:actingRole(),at:Date.now(),name:sel.length+' payments in a run',
   country:S.user.country,acct:'batch',from:h,amt:totHome,fee:0,rail:'BATCH',note:'Payment run of '+sel.length+' bills',
   amtHome:totHome,st:'pending',reason:'Payment run above the '+fmt(S.plat.policy.thresh)+' approval threshold',runId:run.id});
  S.runSel={};rr();toast('Run prepared and sent for approval. Nothing has left your balance yet.');return;
 }
 settleRun(run);
}
function settleRun(run){
 const h=home();
 run.items.forEach(it=>{
  if(balOf(it.ccy)<it.amt){it.st='failed';it.why='Not enough '+it.ccy+' when the run executed';return}
  debit(it.ccy,it.amt);
  const c=findContact(it.who.split(' ·')[0]);
  const tx={id:uid(),t:Date.now(),who:it.who.split(' ·')[0],dir:'out',amt:it.amt,ccy:it.ccy,
   note:'Payment run · '+new Date(run.t).toLocaleDateString('en-SG',{day:'numeric',month:'short'}),
   track:mkTrack(it.ccy===home()?'FAST':'SWIFT',c?c.country:S.user.country)};
  S.plat.txns.unshift(tx);
  S.plat.saved.fees+=Math.max(0,conv(BANK_WIRE,'USD',h));
  if(it.src==='acct')writeBack('bill',it.ref||it.who,it.amt);

function contacts(){return S.plat.contacts||(S.plat.contacts=[])}
function findContact(name){
 const n=(name||'').trim().toLowerCase();
 return contacts().find(c=>c.name.trim().toLowerCase()===n);
}
function upsertContact(name,type,extra){
 if(!name||!name.trim())return null;
 let c=findContact(name);
 if(!c){c={id:uid(),name:name.trim(),type:type,country:S.user.country,ccy:home(),acct:''};contacts().push(c)}
 else if(c.type!==type&&c.type!=='both')c.type='both';
 if(extra)Object.assign(c,extra);
 return c;
}
function syncContacts(){
 (S.plat.inv||[]).forEach(i=>upsertContact(i.client,'customer',null));

function contactStats(c){
 const h=home();
 const inv=(S.plat.inv||[]).filter(i=>i.client===c.name);
 const paid=inv.filter(i=>i.st==='paid'&&i.paidOn);
 const open=inv.filter(i=>i.st!=='paid'&&i.st!=='scheduled');
 const days=paid.map(i=>Math.round((new Date(i.paidOn)-new Date(i.due))/86400000));
 const avg=days.length?Math.round(days.reduce((a,b)=>a+b,0)/days.length):null;
 const bills=(S.plat.bills||[]).filter(b=>b.who.split(' ·')[0]===c.name);
 return {
  billed:inv.reduce((t,i)=>t+conv(i.amt,i.ccy||h,h),0),
  openAmt:open.reduce((t,i)=>t+conv(i.amt,i.ccy||h,h),0),
  openN:open.length,paidN:paid.length,avgDays:avg,
  owedAmt:bills.reduce((t,b)=>t+conv(b.amt,b.ccy||h,h),0),owedN:bills.length
 };
}

const TRACK_STEPS=[['sub','Payment submitted','We have it and the money has left your balance'],

function railEta(rail){return{FAST:0.02,NPP:0.02,FPS:0.02,FPSHK:0.02,'SEPA Instant':0.02,SEPA:1,ACH:2,EFT:2,'Local NZD':1,FEDWIRE:0.5,UAEFTS:0.5,SWIFT:2}[rail]!==undefined?{FAST:0.02,NPP:0.02,FPS:0.02,FPSHK:0.02,SEPA:1,ACH:2,EFT:2,FEDWIRE:0.5,UAEFTS:0.5,SWIFT:2}[rail]:1}
function mkTrack(rail,country){
 const days=railEta(rail);

}
function trackAdvance(txId){

 if(t.track.stage<4){t.track.stage++;rr();
  toast(t.track.stage===4?'Delivered to '+t.who:'Update: '+TRACK_STEPS[t.track.stage-1][1])}
}
function trackDelay(txId){
 const t=S.plat.txns.find(x=>x.id===txId);if(!t||!t.track)return;
 t.track.delayed=true;t.track.eta=t.track.eta+86400000;
 rr();toast('We flagged a delay before you had to ask. The beneficiary bank is doing an extra check.');

function etaText(tr){
 if(tr.stage>=4)return 'Delivered';
 const d=new Date(tr.eta),now=new Date();
 const sameDay=d.toDateString()===now.toDateString();

 if(tr.days<=0.05)return 'Arriving in minutes';
 if(sameDay)return 'Should arrive today by '+d.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});

function runwayChart(rows){

function sendPayment(){

 debit(p.from,amt+rail.fee);

}

function daysLate(due){const n=new Date();n.setHours(0,0,0,0);return Math.round((n-new Date(due))/86400000)}
function invStatus(i){
 if(i.st==='paid')return 'paid';
 if(i.st==='scheduled')return 'scheduled';
 const d=daysLate(i.due);
 if(d>30)return 'at_risk';
 if(d>0)return 'overdue';
 return 'awaiting';
}
const ST_LABEL={paid:'Paid',at_risk:'At risk',overdue:'Overdue',awaiting:'Awaiting payment',scheduled:'Scheduled'};
const ST_TAG={paid:'tag-ok',at_risk:'tag-bad',overdue:'tag-warn',awaiting:'tag-mut',scheduled:'tag-b'};
function filterInv(){
 const f=S.invF||{q:'',st:'all',from:'',to:''};
 return (S.plat.inv||[]).filter(i=>{
  if(f.q){const q=f.q.toLowerCase();if(!((i.client||'').toLowerCase().includes(q)||(i.no||'').toLowerCase().includes(q)))return false}
  if(f.st!=='all'&&invStatus(i)!==f.st)return false;
  if(f.from&&i.due<f.from)return false;
  if(f.to&&i.due>f.to)return false;
  return true;
 });
}
function filterBills(){
 const f=S.billF||{q:'',st:'all',from:'',to:''};
 const n=new Date();n.setHours(0,0,0,0);
 return (S.plat.bills||[]).filter(b=>{
  if(f.q&&!(b.who||'').toLowerCase().includes(f.q.toLowerCase()))return false;
  const d=Math.round((new Date(b.due)-n)/86400000);
  if(f.st==='overdue'&&d>=0)return false;
  if(f.st==='week'&&!(d>=0&&d<=7))return false;
  if(f.st==='later'&&d<=7)return false;
  if(f.from&&b.due<f.from)return false;
  if(f.to&&b.due>f.to)return false;
  return true;
 });
}

 const recv=conv(amt,f.from,f.to)*(1-marg);
 debit(f.from,amt);credit(f.to,recv);
 if(!bothStable)S.plat.saved.fx+=conv(amt,f.from,home())*(BANK_FXM-marg);
 S.plat.txns.unshift({id:uid(),t:Date.now(),who:'Conversion',dir:'in',amt:recv,ccy:f.to,note:'Converted from '+fmt(amt,f.from)+' at mid plus '+(marg*100).toFixed(2)+'% itemised, instant'});
 S.fx.amt='';rr();toast('Converted. '+fmt(recv,f.to)+' is in your balance.');
}
/* ---- team (Wise roles) ---- */
function tTeam(){
 return `<h1 style="margin-bottom:6px">Team</h1>
 <p class="muted" style="margin-bottom:20px">Invite your accountant, your ops person, your co-founder. Roles follow the Wise model, and access can be scoped to one entity so your Australian bookkeeper sees only the Australian company.</p>
 <div class="card" style="margin-bottom:16px"><h3 style="margin-bottom:10px">Members</h3>
  <table><tr><th>Person</th><th>Role</th><th>Entity access</th><th>Status</th><th></th></tr>
  ${S.plat.team.map(m=>`<tr><td class="b">${esc(m.name||m.email)}<div class="small muted">${esc(m.email)}</div></td>
   <td>${m.role==='owner'?'<span class="tag tag-b">Owner</span>':`<select onchange="S.plat.team.find(x=>x.id==='${m.id}').role=this.value;save();toast('Role updated')" style="padding:5px 8px;border:1.5px solid var(--line);border-radius:8px">${ROLES.slice(1).map(r=>`<option value="${r[0]}" ${m.role===r[0]?'selected':''}>${r[1]}</option>`).join('')}</select>`}</td>
   <td>${m.role==='owner'?'<span class="small muted">All entities</span>':`<select onchange="S.plat.team.find(x=>x.id==='${m.id}').ents=this.value;save();toast('Entity access updated')" style="padding:5px 8px;border:1.5px solid var(--line);border-radius:8px">
     <option value="all" ${(m.ents||'all')==='all'?'selected':''}>All entities</option>
     ${ents().map(e=>`<option value="${e.id}" ${m.ents===e.id?'selected':''}>${esc(e.name)} only</option>`).join('')}</select>`}</td>
   <td><span class="tag ${m.st==='active'?'tag-ok':'tag-mut'}">${m.st}</span></td>
   <td>${m.role!=='owner'?`<button class="btn btn-g btn-sm" style="color:#B42318" onclick="S.plat.team=S.plat.team.filter(x=>x.id!=='${m.id}');rr()">Remove</button>`:''}</td></tr>`).join('')}</table>
  <div class="row2" style="margin-top:14px"><div class="field"><label>Invite by email</label><input id="tm-em" placeholder="colleague@company.com"></div>
  <div class="field"><label>Role</label><select id="tm-rl">${ROLES.slice(1).map(r=>`<option value="${r[0]}">${r[1]}</option>`).join('')}</select></div></div>
  <button class="btn btn-p" onclick="inviteMember()">Send invite</button>
 </div>
 <div class="card"><h3 style="margin-bottom:8px">What each role can do</h3>

function inviteMember(){
 const em=$('tm-em').value.trim();
 if(!emailOk(em)){toast('Enter a valid email');return}
 if(S.plat.team.some(m=>m.email===em)){toast('Already on the team');return}

/* ---- top up ---- */
function mTopup(){
 return `<div class="ov" onclick="if(event.target===this){S.modal=null;rr()}"><div class="modal">
  <h2 style="margin-bottom:14px">Top up your ${home()} balance</h2>
  <div class="field"><label>Amount (${home()})</label><input id="tu-amt" type="number" min="0" placeholder="0.00"></div>
  <div class="sel" onclick="topup('bank')"><span style="font-size:17px">🏦</span><span style="flex:1"><span class="b">Bank transfer</span><br><span class="small muted">Free. Use your local account details, funds land in minutes.</span></span><span class="b">Free</span></div>
  <div class="sel" onclick="topup('card')"><span style="font-size:17px">💳</span><span style="flex:1"><span class="b">Debit or credit card</span><br><span class="small muted">Instant. The fee is shown before you pay, never after.</span></span><span class="b">2.9%</span></div>
  <button class="btn btn-s" onclick="S.modal=null;rr()">Cancel</button>
 </div></div>`;
}
function topup(method){
 const amt=Number($('tu-amt').value);
 if(!(amt>0)){toast('Enter an amount first');return}
 if(method==='bank'){S.modal=null;rr();toast('Use your '+home()+' account details ('+VAD[home()]+'). In this prototype, bank top ups are instant via a payment link simulation.');return}
 const fee=amt*0.029;
 credit(home(),amt);
 S.plat.txns.unshift({id:uid(),t:Date.now(),who:'Card top up',dir:'in',amt:amt,ccy:home(),note:'Card charged '+fmt(amt+fee)+' including the 2.9% fee ('+fmt(fee)+'), shown before you paid'});
 S.modal=null;rr();toast('Topped up '+fmt(amt)+'. Card was charged '+fmt(amt+fee)+'.');
}
/* ---- AskMO ---- */
const MO_PROMPTS=['What is my balance?','What are my limits?','What is my FX risk?','What did I earn in treasury?'];
function moAsk(q){
 S.mo.msgs.push({me:true,t:q});
 const ql=q.toLowerCase();let a;
 if(!live())a='I can see your application status: '+REVIEW_STAGES[app_().stage].t.toLowerCase()+'. Money questions unlock once you are approved.';
 else if(ql.includes('balance'))a='Your total is '+fmt(totalHome())+' ('+Object.entries(S.plat.bals).filter(([c,n])=>n>0.005).map(([c,n])=>fmt(n,c)).join(', ')+'), synced live. One number, one ledger, no stale cache.';
 else if(ql.includes('limit'))a=limited()?('Starter limits: '+fmt(lim().tx)+' per transfer, '+fmt(lim().mo)+' per month, cards at full approval. The team usually clears these within 1 to 2 days. Your risk score was '+app_().risk.score+', you can open the report from your home page.'):'No limits on your account, you are fully approved.';
 else if(ql.includes('dso')||ql.includes('outstanding')||ql.includes('slow')){const inv=S.plat.inv||[];const h2=home();const tot=inv.reduce((t,i)=>t+conv(i.amt,i.ccy||h2,h2),0);const ar=inv.filter(i=>i.st!=='paid').reduce((t,i)=>t+conv(i.amt,i.ccy||h2,h2),0);a=tot>0?('Your DSO is about '+Math.round(ar/tot*30)+' days, '+fmt(ar)+' of what you billed is still out. The overdue ones are on the Invoices screen, I can draft the follow ups for your approval.'):'No invoices billed yet, DSO appears once you bill.'}
 else if(ql.includes('due')||ql.includes('bill')){const bs=S.plat.bills.filter(b=>new Date(b.due)-Date.now()<7*86400000);a=bs.length?('Due within 7 days: '+bs.map(b=>b.who.split(' ·')[0]+' '+fmt(b.amt)+' on '+b.due).join('; ')+'. Want me to queue any of them?'):'Nothing due in the next 7 days.'}
 else if(ql.includes('treasury')||ql.includes('earn')||ql.includes('yield')||ql.includes('interest'))a=Object.keys(S.plat.treas.holdings).length?('You hold '+fmt(treasTotal())+' in treasury and accrued about '+fmt(accruedToday())+' today. Yield posts daily.'):'Nothing in treasury yet. Your idle cash could earn around 3.6% in a tokenised USD money market fund, want to look?';
 else if(ql.includes('fx')||ql.includes('risk')||ql.includes('var')){const pp=vrParams(),ex=fxExposures(pp.basis),r=varCalc(ex,pp);const ks=Object.keys(r.comp).sort((a,b)=>r.comp[b]-r.comp[a]);a=ks.length?('Your '+pp.conf+'% VaR over '+({1:'1 day',5:'1 week',21:'1 month'}[pp.hor])+' is '+fmt(r.v)+'. '+ks[0]+' drives most of it. I can convert part of it now or arm a target rate trigger, your call on the FX screen.'):'No FX risk right now, you hold only '+home()+'. I will flag it here the moment a foreign balance or receivable appears.'}
 else if(ql.includes('burn')||ql.includes('outflow'))a='Committed outflows for the next two weeks total '+fmt(S.plat.bills.reduce((t,b)=>t+b.amt,0))+'. Against '+fmt(totalHome())+' you are covered.';
 else a='In this prototype I answer questions about balances, limits, bills and treasury, from the same ledger the dashboard reads. In production I route anything else to the right internal specialist.';
 S.mo.msgs.push({me:false,t:a});rr();
 setTimeout(()=>{const b=document.querySelector('.mo-msgs');if(b)b.scrollTop=b.scrollHeight},30);
}
function vMo(){
 return `<div class="mo-drawer">
  <div style="padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px"><span style="font-size:17px">✦</span><span class="b">AskMO</span><span class="tag tag-b">${S.acct==='biz'?'operations assistant':'your money, answered'}</span><button class="btn btn-g btn-sm" style="margin-left:auto" onclick="S.mo.open=false;rr()">Close</button></div>
  <div class="mo-msgs">
   ${S.mo.msgs.length?'':'<div class="small muted" style="margin-bottom:10px">Every suggested prompt below is guaranteed to work. MO never advertises a question it cannot answer.</div>'}
   ${S.mo.msgs.map(m=>`<div class="msg ${m.me?'me':'mo'}">${esc(m.t)}</div>`).join('')}
  </div>
  <div style="padding:14px 18px;border-top:1px solid var(--line)">
   <div style="margin-bottom:8px">${MO_PROMPTS.map(p=>`<button class="pchip" onclick="moAsk('${p}')">${p}</button>`).join('')}</div>
   <div style="display:flex;gap:8px"><input id="moin" placeholder="Ask about your money…" style="flex:1;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px" onkeydown="if(event.key==='Enter'&&this.value.trim()){moAsk(this.value.trim());this.value=''}">
   <button class="btn btn-p" onclick="const i=$('moin');if(i.value.trim()){moAsk(i.value.trim());i.value=''}">Send</button></div>
  </div>
 </div>`;
}
/* ============ feedback (Google Docs style comments) ============ */
const FLS='finmo_feedback_v1';
function loadF(){try{const r=localStorage.getItem(FLS);if(r)return JSON.parse(r)}catch(e){}return{mode:false,open:false,author:'',items:[]}}
let F=loadF();
try{Object.defineProperty(window,'F',{get:()=>F,set:v=>{F=v}})}catch(e){}
function saveF(){try{localStorage.setItem(FLS,JSON.stringify(F))}catch(e){}}
const SCREENS={signup:'Signup',verify:'Email verify',kybintro:'Verification intro',wizard:'KYB wizard',screening:'Screening',tracker:'Review tracker',app:'Dashboard'};
function fbScreen(){let n=SCREENS[S.view]||S.view;if(S.view==='app')n='Dashboard · '+(S.tab||'home');return n}
function cssPath(el){
 const parts=[];let n=el;
 while(n&&n.id!=='app'&&n.tagName&&parts.length<12){
  const p=n.parentElement;if(!p)break;
  parts.unshift(n.tagName.toLowerCase()+':nth-child('+(Array.from(p.children).indexOf(n)+1)+')');
  n=p;
 }
 return '#app>'+parts.join('>');
}
function fbButton(){
 const open=F.items.filter(i=>!i.done).length;
 return `<button id="fbbtn" class="fbbtn ${F.mode?'live':''}" onclick="event.stopPropagation();fbToggle()">💬 ${F.mode?'Click anything to comment':'Feedback'}${F.items.length?`<span class="n">${open}</span>`:''}</button>
 ${F.mode?'<div class="fbhint">Feedback mode is on. Click any element to leave a comment, press the button again to stop.</div>':''}`;
}
function fbToggle(){
 if(F.mode){F.mode=false}
 else if(F.items.length&&!F.mode){F.open=!F.open;if(!F.open){F.mode=true;F.open=false}}
 else F.mode=true;
 if(F.items.length&&!F.mode&&!F.open){F.open=true}
 saveF();render();
}
function fbCompose(x,y,path,snippet){
 fbCloseP();
 const d=document.createElement('div');d.className='fbpop';d.id='fbpop';
 d.style.left=Math.min(x,window.innerWidth-320)+'px';d.style.top=(y+8)+'px';
 d.innerHTML=`<div class="small b" style="margin-bottom:6px">New comment</div>
  ${snippet?`<div class="fbitem q" style="border:none;padding:0 0 0 8px;margin:0 0 8px">on: &ldquo;${esc(snippet)}&rdquo;</div>`:''}
  ${F.author?'':'<input id="fbname" placeholder="Your name" style="margin-bottom:8px">'}
  <textarea id="fbtext" rows="3" placeholder="What should change?"></textarea>
  <div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-p btn-sm" onclick="fbSave('${path}','${esc(snippet).replace(/'/g,'&#39;')}',${x},${y})">Comment</button>
  <button class="btn btn-s btn-sm" onclick="fbCloseP()">Cancel</button></div>`;
 document.body.appendChild(d);
 setTimeout(()=>{const t=$('fbtext');if(t)t.focus()},30);
}
function fbSave(path,snippet,x,y){
 const t=$('fbtext').value.trim();
 if(!t){toast('Write the comment first');return}
 const nm=$('fbname');if(nm&&nm.value.trim())F.author=nm.value.trim();
 F.items.push({id:uid(),text:t,by:F.author||'Anonymous',at:Date.now(),screen:fbScreen(),view:S.view,tab:S.tab,path,snippet,x,y,done:false});
 saveF();fbCloseP();render();toast('Comment added. Use the Feedback panel to copy everything for WhatsApp.');
}
function fbCloseP(){const d=$('fbpop');if(d)d.remove()}
function fbShow(id){
 fbCloseP();
 const it=F.items.find(i=>i.id===id);if(!it)return;
 const el=document.querySelector(it.path);
 const r=el?el.getBoundingClientRect():null;
 const x=r?r.left+window.scrollX:it.x,y=r?r.bottom+window.scrollY:it.y;
 const d=document.createElement('div');d.className='fbpop';d.id='fbpop';
 d.style.left=Math.min(x,window.innerWidth-320)+'px';d.style.top=(y+6)+'px';
 d.innerHTML=`<div style="display:flex;align-items:center;gap:8px"><span class="b small">${esc(it.by)}</span><span class="small muted">${new Date(it.at).toLocaleString('en-SG',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div>
  ${it.snippet?`<div class="fbitem q" style="border:none;padding:0 0 0 8px;margin:6px 0 0">&ldquo;${esc(it.snippet)}&rdquo;</div>`:''}
  <div style="margin:8px 0">${esc(it.text)}</div>
  <div style="display:flex;gap:8px"><button class="btn btn-s btn-sm" onclick="fbDone('${it.id}')">${it.done?'Reopen':'Resolve'}</button>
  <button class="btn btn-g btn-sm" style="color:#B42318" onclick="fbDel('${it.id}')">Delete</button>
  <button class="btn btn-g btn-sm" onclick="fbCloseP()">Close</button></div>`;
 document.body.appendChild(d);
}
function fbDone(id){const it=F.items.find(i=>i.id===id);if(it){it.done=!it.done;saveF();fbCloseP();render()}}
function fbDel(id){F.items=F.items.filter(i=>i.id!==id);saveF();fbCloseP();render()}
function fbExport(){
 if(!F.items.length){toast('No comments yet');return}
 const lines=['Feedback on the Finmo Door 1 prototype:',''];
 F.items.forEach((it,i)=>lines.push((i+1)+'. ['+it.screen+']'+(it.snippet?' on "'+it.snippet+'"':'')+' '+(it.done?'(resolved) ':'')+'- '+it.text+' ('+it.by+')'));
 copyTxt(lines.join('\n'));
}
function fbPanel(){
 if(!F.open)return '';
 const rows=F.items.slice().reverse().map((it,idx)=>`<div class="fbitem" style="${it.done?'opacity:.55':''}">
  <div style="display:flex;gap:8px;align-items:center"><span class="fbpin" style="position:static;width:20px;height:20px;font-size:11px" class2>${F.items.indexOf(it)+1}</span>
   <span class="b small">${esc(it.by)}</span><span class="small muted">${esc(it.screen)}</span>
   <span style="margin-left:auto"></span>
   ${it.done?'<span class="tag tag-mut">resolved</span>':''}</div>
  ${it.snippet?`<div class="q">&ldquo;${esc(it.snippet)}&rdquo;</div>`:''}
  <div class="small" style="margin-top:4px">${esc(it.text)}</div>
  <div style="display:flex;gap:6px;margin-top:8px">
   <button class="btn btn-g btn-sm" onclick="fbJump('${it.id}')">Go to</button>
   <button class="btn btn-g btn-sm" onclick="fbDone('${it.id}')">${it.done?'Reopen':'Resolve'}</button>
   <button class="btn btn-g btn-sm" style="color:#B42318" onclick="fbDel('${it.id}')">Delete</button></div>
 </div>`).join('');
 return `<div class="fbdrawer">
  <div style="padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px"><span class="b">Feedback</span><span class="tag tag-b">${F.items.length}</span>
   <button class="btn btn-g btn-sm" style="margin-left:auto" onclick="F.open=false;saveF();render()">Close</button></div>
  <div style="flex:1;overflow:auto;padding:16px 18px">
   ${rows||'<div class="small muted">No comments yet. Turn on feedback mode and click anything.</div>'}
  </div>
  <div style="padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap">
   <button class="btn btn-p btn-sm" onclick="fbExport()">Copy all for WhatsApp</button>
   <button class="btn btn-s btn-sm" onclick="F.mode=true;F.open=false;saveF();render()">Add another</button>
   <button class="btn btn-g btn-sm" style="color:#B42318" onclick="if(confirm('Delete all comments?')){F.items=[];saveF();render()}">Clear all</button>
  </div></div>`;
}
function fbJump(id){
 const it=F.items.find(i=>i.id===id);if(!it)return;
 S.view=it.view;if(it.tab)S.tab=it.tab;F.open=false;saveF();render();
 setTimeout(()=>{const el=document.querySelector(it.path);if(el)el.scrollIntoView({block:'center'});fbShow(id)},60);
}
function fbPins(){
 document.querySelectorAll('.fbpin[data-pin]').forEach(e=>e.remove());
 F.items.forEach((it,i)=>{
  if(it.view!==S.view)return;
  if(it.view==='app'&&it.tab!==S.tab)return;
  const el=document.querySelector(it.path);if(!el)return;
  const r=el.getBoundingClientRect();
  const d=document.createElement('div');d.className='fbpin'+(it.done?' done':'');d.setAttribute('data-pin','1');
  d.style.left=(r.right+window.scrollX-10)+'px';d.style.top=(r.top+window.scrollY-10)+'px';
  d.textContent=i+1;d.onclick=ev=>{ev.stopPropagation();fbShow(it.id)};
  document.body.appendChild(d);
 });
}
function fbClickCapture(ev){
 if(!F.mode)return;
 if(ev.target.closest('#fbbtn')||ev.target.closest('.fbpop')||ev.target.closest('.fbdrawer')||ev.target.closest('.fbpin'))return;
 const t=ev.target.closest('#app *');if(!t)return;
 ev.preventDefault();ev.stopPropagation();
 const snippet=(t.innerText||'').trim().replace(/\s+/g,' ').slice(0,70);
 fbCompose(ev.pageX,ev.pageY,cssPath(t),snippet);
}
/* ============ render ============ */
function render(){
 const views={signup:vSignup,verify:vVerify,kybintro:vIntro,wizard:vWizard,screening:vScreening,tracker:vTracker,app:vApp};
 try{
  $('app').innerHTML=(views[S.view]||vSignup)()+demoBar()+fbButton()+fbPanel();
  fbCloseP();fbPins();
 }catch(e){
  // A blank screen is the one failure a prototype must never show.
  try{console.error('Render failed:',e)}catch(_){}
  $('app').innerHTML=`<div class="auth-r" style="min-height:100vh"><div class="authbox" style="width:520px">
   <span class="logo"><span class="lg">f</span>finmo</span>
   <h1 style="margin:26px 0 8px">Let's start you fresh</h1>
   <p class="muted" style="margin-bottom:18px">This browser is holding data from an earlier version of the prototype, so this screen could not load. Starting fresh fixes it and takes a few seconds. Any comments you left are kept.</p>
   <button class="btn btn-p" onclick="softReset()">Start fresh</button>
   <p class="small muted" style="margin-top:14px">Technical detail, in case it is useful: ${esc(String(e&&e.message||e))}</p>
  </div></div>`;
 }
}
function softReset(){
 try{localStorage.removeItem(LS)}catch(e){}
 clearTimeout(reviewT);clearTimeout(clearT);
 S=DEF();
 try{render()}catch(e){location.reload()}
 toast('Fresh start. Your comments were kept.');
}
</script>
